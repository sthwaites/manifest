version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      app-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /sandbox
    schedule:
      interval: weekly
    groups:
      sandbox-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
