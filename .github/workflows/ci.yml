name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  verify:
    name: Verify application
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            sandbox/package-lock.json

      - name: Install main dependencies
        run: npm ci

      - name: Install sandbox dependencies
        run: npm --prefix sandbox ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Audit runtime dependencies
        run: npm run security:audit

      - name: Test main app
        run: npm run test:run

      - name: Build main app
        run: npm run build

      - name: Test sandbox app
        run: npm --prefix sandbox run test:run

      - name: Build sandbox app
        run: npm --prefix sandbox run build

  docker:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Prepare image metadata
        id: images
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          owner="$(printf '%s' "$OWNER" | tr '[:upper:]' '[:lower:]')"
          short_sha="${GITHUB_SHA::12}"
          echo "app=ghcr.io/${owner}/manifest-app" >> "$GITHUB_OUTPUT"
          echo "sandbox=ghcr.io/${owner}/manifest-sandbox" >> "$GITHUB_OUTPUT"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build app image
        run: |
          docker build \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --tag "${{ steps.images.outputs.app }}:sha-${{ steps.images.outputs.short_sha }}" \
            --tag "${{ steps.images.outputs.app }}:latest" \
            .

      - name: Build sandbox image
        run: |
          docker build \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --tag "${{ steps.images.outputs.sandbox }}:sha-${{ steps.images.outputs.short_sha }}" \
            --tag "${{ steps.images.outputs.sandbox }}:latest" \
            ./sandbox

      - name: Push images to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push "${{ steps.images.outputs.app }}:sha-${{ steps.images.outputs.short_sha }}"
          docker push "${{ steps.images.outputs.app }}:latest"
          docker push "${{ steps.images.outputs.sandbox }}:sha-${{ steps.images.outputs.short_sha }}"
          docker push "${{ steps.images.outputs.sandbox }}:latest"
