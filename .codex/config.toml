# .codex/config.toml
# Project-scoped Codex configuration for Manifest.
# This file is trusted only in repos you explicitly trust — Codex will prompt on first use.
#
# Install commands (run once after Codex access lands):
#   codex mcp add openai_docs --url https://developers.openai.com/mcp
#   codex mcp add context7 -- npx -y @upstash/context7-mcp
#   codex mcp add github --env GITHUB_TOKEN=$GITHUB_TOKEN -- npx -y @github/github-mcp-server
#   codex mcp add chrome_devtools -- npx chrome-devtools-mcp@latest
#   codex mcp add playwright -- npx @playwright/mcp@latest --caps=testing,storage,network
#
# For chrome_devtools to inspect your running dev server, start Chrome with:
#   open -a "Google Chrome" --args --remote-debugging-port=9222 --user-data-dir=/tmp/chrome-debug
# Then change the args below to: ["chrome-devtools-mcp@latest", "--browser-url=http://127.0.0.1:9222"]

# 1. OpenAI Docs MCP — authoritative Codex SDK / App Server / Skills / CLI / AGENTS.md docs
#    Use when: any question about Codex surfaces, method signatures, event types
[mcp_servers.openai_docs]
url = "https://developers.openai.com/mcp"

# 2. Context7 — up-to-date library docs (Next.js 15, Prisma, NextAuth v5, Vitest, shadcn/ui)
#    Use when: any question about framework APIs, library options, version-specific behaviour
[mcp_servers.context7]
command = "/root/.nvm/versions/node/v20.20.2/bin/node"
args = ["/root/.nvm/versions/node/v20.20.2/lib/node_modules/@upstash/context7-mcp/dist/index.js"]

# 3. GitHub — open PRs, manage issues, read repo state
#    Use when: concept requires GitHub output (PRs, comments, branch management)
#    The official GitHub MCP server is not published on npm.
#    Use GitHub's remote server or the Docker image `ghcr.io/github/github-mcp-server`.
# [mcp_servers.github]
# url = "https://api.githubcopilot.com/mcp/"

# 4. Chrome DevTools MCP — browser inspection (Google, listed in Codex MCP docs)
#    41 tools: list_console_messages, list_network_requests, take_screenshot,
#    evaluate_script, lighthouse_audit, take_heapsnapshot, and more.
#    Use when: verifying UI output, reading console errors, inspecting network requests,
#    checking that a feature request rendered correctly in the browser.
#    Spawns its own Chrome instance by default. To attach to your running dev browser instead,
#    start Chrome with --remote-debugging-port=9222 and switch args to include
#    "--browser-url=http://127.0.0.1:9222"
[mcp_servers.chrome_devtools]
command = "/root/.nvm/versions/node/v20.20.2/bin/node"
args = ["/root/.nvm/versions/node/v20.20.2/lib/node_modules/chrome-devtools-mcp/build/src/bin/chrome-devtools-mcp.js"]

# 5. Playwright MCP — browser interaction and testing assertions
#    Use when: navigating local pages, clicking/typing, checking accessibility snapshots,
#    preserving auth state, inspecting requests, and making repeatable browser assertions.
#    Chrome DevTools MCP remains the preferred tool for screenshots, console log triage,
#    runtime JavaScript inspection, and deep debugging.
[mcp_servers.playwright]
command = "/root/.nvm/versions/node/v20.20.2/bin/node"
args = ["/root/.nvm/versions/node/v20.20.2/lib/node_modules/@playwright/mcp/cli.js", "--caps=testing,storage,network"]
