# Change this app name before the first deploy, or run:
# fly launch --copy-config --name <your-fly-app-name>
app = "manifest-part2-demo"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  DEBUG_AUTH = "true"
  DATABASE_URL = "file:/app/persist/data/prod.db"
  NEXTAUTH_URL = "https://manifest-part2-demo.fly.dev"
  NEXT_PUBLIC_SANDBOX_PUBLIC_URL = "/sandbox/"
  SANDBOX_INTERNAL_URL = "http://localhost:3001/sandbox"
  SANDBOX_BASE_PATH = "/sandbox"
  NEXT_PUBLIC_SANDBOX_BASE_PATH = "/sandbox"
  RUN_SANDBOX_IN_CONTAINER = "true"
  START_PROXY = "true"
  PORT = "8080"
  PROXY_PORT = "8080"
  MANIFEST_PORT = "3000"
  SANDBOX_PORT = "3001"
  BRIDGE_PORT = "3002"
  PERSIST_ROOT = "/app/persist"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[mounts]]
  source = "manifest_data"
  destination = "/app/persist"
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
