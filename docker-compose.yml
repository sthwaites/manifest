services:
  app:
    restart: unless-stopped
    build:
      context: .
      args:
        DEBUG_AUTH: ${DOCKER_DEBUG_AUTH:-false}
    ports:
      - "${MANIFEST_PORT:-3000}:3000"
      - "${SANDBOX_PORT:-3001}:3001"
      - "${BRIDGE_PORT:-3002}:3002"
    volumes:
      - db_data:/app/data
      - sandbox_src:/app/sandbox
      - sandbox_node_modules:/app/sandbox/node_modules
    environment:
      DATABASE_URL: file:/app/data/dev.db
      DEBUG_AUTH: ${DOCKER_DEBUG_AUTH:-false}
      RUN_SANDBOX_IN_CONTAINER: "true"
      START_PROXY: "false"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
      AUTH0_CLIENT_SECRET: ${AUTH0_CLIENT_SECRET:-}
      AUTH0_ISSUER: ${AUTH0_ISSUER:-}
      NEXT_PUBLIC_SANDBOX_PUBLIC_URL: ${NEXT_PUBLIC_SANDBOX_PUBLIC_URL:-http://localhost:3001}
      SANDBOX_INTERNAL_URL: http://localhost:3001
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CODEX_API_KEY: ${CODEX_API_KEY:-}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 12s
      retries: 12
      start_period: 45s

volumes:
  db_data:
  sandbox_src:
  sandbox_node_modules:
